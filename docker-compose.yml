services:
  postgres:                        # name of this service
    image: postgres:16             # use the official Postgres 16 image
    container_name: bookstore-db   # name the running container
    environment:
      POSTGRES_DB: bookstore       # create a database called "bookstore"
      POSTGRES_USER: postgres      # username
      POSTGRES_PASSWORD: postgres  # password
    ports:
      - "5432:5432"                # host:container — expose container's 5432 to your machine's 5432